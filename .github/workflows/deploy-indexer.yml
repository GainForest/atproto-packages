name: Deploy Indexer to Railway

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────────────────────
# Only runs when indexer source code or its dependencies change.
# Pure bumicerts / docs / unrelated changes never trigger this workflow.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths:
      - 'apps/indexer/**'
      - 'packages/internal-utils/**'
      - 'GENERATED/lexicons/**'
      - 'GENERATED/scripts/generate-collections.ts'
  pull_request:
    paths:
      - 'apps/indexer/**'
      - 'packages/internal-utils/**'
      - 'GENERATED/lexicons/**'
      - 'GENERATED/scripts/generate-collections.ts'
  workflow_dispatch:
    inputs:
      skip_railway:
        description: 'Skip Railway deployment (validation only)'
        required: false
        default: 'false'

# ─────────────────────────────────────────────────────────────────────────────
# Jobs
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # 1. Validate — typecheck + smoke-test Docker builds + generate filters
  # ───────────────────────────────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      collection_filters: ${{ steps.filters.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.7"

      - name: Install dependencies
        run: bun install

      - name: Typecheck indexer
        run: bun run typecheck
        working-directory: apps/indexer

      - name: Generate collection filters
        id: filters
        working-directory: apps/indexer
        run: |
          FILTERS=$(bun run src/tap/collection-filters.ts)
          echo "value=$FILTERS" >> $GITHUB_OUTPUT
          echo "### Validation Passed ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**TAP_COLLECTION_FILTERS:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "$FILTERS" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local dev Dockerfile (smoke test)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/indexer/Dockerfile
          push: false
          tags: gainforest-indexer:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Railway Dockerfile (smoke test)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/indexer/Dockerfile.railway
          push: false
          tags: gainforest-indexer-railway:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───────────────────────────────────────────────────────────────────────────
  # 2. Deploy — sync env vars + trigger Railway redeployment
  #
  # Only runs on pushes to main (not PRs or workflow_dispatch with skip flag).
  #
  # ENV VARIABLE SYNC RULES:
  #   - Static values are parsed from .env.railway / tap.env.railway and
  #     upserted to Railway so the file is the single source of truth.
  #   - Lines containing ${{ are Railway reference variables or secret()
  #     generators — these are SKIPPED so they are never overwritten.
  #     Set them once in the Railway UI during initial project setup.
  #   - TAP_COLLECTION_FILTERS is always overridden with the freshly
  #     generated value from the validate job above.
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    needs: validate
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      github.event.inputs.skip_railway != 'true' &&
      github.repository == 'GainForest/atproto-packages'
    env:
      RAILWAY_API: https://backboard.railway.com/graphql/v2
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Check secrets
        id: check
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$RAILWAY_PROJECT_ID" ]; then
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "::warning::RAILWAY_TOKEN or RAILWAY_PROJECT_ID is not set. Skipping deployment."
          else
            echo "ready=true" >> $GITHUB_OUTPUT
          fi

      # ── Resolve IDs ──────────────────────────────────────────────────────
      - name: Resolve service and environment IDs
        if: steps.check.outputs.ready == 'true'
        id: resolve
        run: |
          RESPONSE=$(curl -sf -X POST "$RAILWAY_API" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"query { project(id: \\\"$RAILWAY_PROJECT_ID\\\") { environments { edges { node { id name } } } services { edges { node { id name } } } } }\"}")

          echo "API response: $RESPONSE"

          ENV_ID=$(echo "$RESPONSE" | jq -r '.data.project.environments.edges[0].node.id')
          TAP_ID=$(echo "$RESPONSE" | jq -r '.data.project.services.edges[] | select(.node.name == "tap") | .node.id')
          INDEXER_ID=$(echo "$RESPONSE" | jq -r '.data.project.services.edges[] | select(.node.name == "indexer") | .node.id')

          echo "env_id=$ENV_ID" >> $GITHUB_OUTPUT
          echo "tap_id=$TAP_ID" >> $GITHUB_OUTPUT
          echo "indexer_id=$INDEXER_ID" >> $GITHUB_OUTPUT

          echo "Environment ID : $ENV_ID"
          echo "Tap service ID : $TAP_ID"
          echo "Indexer service ID: $INDEXER_ID"

      # ── Tap: sync env vars ────────────────────────────────────────────────
      # Reads apps/indexer/railway/tap.env.railway, strips comments, blank
      # lines, and any line whose value contains ${{ (Railway references /
      # secret generators — those must be set once in the Railway UI).
      # Then merges in the freshly generated TAP_COLLECTION_FILTERS.
      - name: Sync Tap environment variables
        if: steps.check.outputs.ready == 'true'
        env:
          FILTERS: ${{ needs.validate.outputs.collection_filters }}
          RESOLVED_ENV_ID: ${{ steps.resolve.outputs.env_id }}
          RESOLVED_TAP_ID: ${{ steps.resolve.outputs.tap_id }}
        run: |
          # Build the Railway reference prefix as a shell variable so GitHub
          # Actions never sees a raw reference-open token in this script.
          RAILWAY_REF_PREFIX='$'"{{" # dollar + double-brace: matches Railway refs in env files
          # Parse static vars from tap.env.railway
          # Skip comments, blank lines, and Railway reference/secret lines
          VARS_JSON=$(grep -v '^\s*#' apps/indexer/railway/tap.env.railway \
            | grep -v '^\s*$' \
            | grep -v "$RAILWAY_REF_PREFIX" \
            | awk -F'=' '{key=$1; $1=""; val=substr($0,2); gsub(/^[ \t]+|[ \t]+$/, "", val); print key "=" val}' \
            | jq -R -s '
                split("\n")
                | map(select(length > 0))
                | map(
                    . as $line
                    | ($line | index("=")) as $i
                    | { ($line[:$i]): $line[$i+1:] }
                  )
                | add // {}
              ')

          # Override TAP_COLLECTION_FILTERS with the freshly generated value
          VARS_JSON=$(echo "$VARS_JSON" | jq --arg v "$FILTERS" '. + {"TAP_COLLECTION_FILTERS": $v}')

          echo "Syncing Tap vars: $(echo "$VARS_JSON" | jq 'keys')"

          curl -sf -X POST "$RAILWAY_API" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg projectId     "$RAILWAY_PROJECT_ID" \
              --arg environmentId "$RESOLVED_ENV_ID" \
              --arg serviceId     "$RESOLVED_TAP_ID" \
              --argjson variables "$VARS_JSON" \
              '{
                query: "mutation($input: VariableCollectionUpsertInput!) { variableCollectionUpsert(input: $input) }",
                variables: { input: { projectId: $projectId, environmentId: $environmentId, serviceId: $serviceId, variables: $variables } }
              }')"

          echo "✅ Tap environment variables synced"

      # ── Indexer: sync env vars ────────────────────────────────────────────
      # Same logic as above but reads apps/indexer/.env.railway
      - name: Sync Indexer environment variables
        if: steps.check.outputs.ready == 'true'
        env:
          RESOLVED_ENV_ID: ${{ steps.resolve.outputs.env_id }}
          RESOLVED_INDEXER_ID: ${{ steps.resolve.outputs.indexer_id }}
        run: |
          RAILWAY_REF_PREFIX='$'"{{" # dollar + double-brace: matches Railway refs in env files
          VARS_JSON=$(grep -v '^\s*#' apps/indexer/.env.railway \
            | grep -v '^\s*$' \
            | grep -v "$RAILWAY_REF_PREFIX" \
            | awk -F'=' '{key=$1; $1=""; val=substr($0,2); gsub(/^[ \t]+|[ \t]+$/, "", val); print key "=" val}' \
            | jq -R -s '
                split("\n")
                | map(select(length > 0))
                | map(
                    . as $line
                    | ($line | index("=")) as $i
                    | { ($line[:$i]): $line[$i+1:] }
                  )
                | add // {}
              ')

          echo "Syncing Indexer vars: $(echo "$VARS_JSON" | jq 'keys')"

          curl -sf -X POST "$RAILWAY_API" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg projectId     "$RAILWAY_PROJECT_ID" \
              --arg environmentId "$RESOLVED_ENV_ID" \
              --arg serviceId     "$RESOLVED_INDEXER_ID" \
              --argjson variables "$VARS_JSON" \
              '{
                query: "mutation($input: VariableCollectionUpsertInput!) { variableCollectionUpsert(input: $input) }",
                variables: { input: { projectId: $projectId, environmentId: $environmentId, serviceId: $serviceId, variables: $variables } }
              }')"

          echo "✅ Indexer environment variables synced"

      # ── Trigger redeployments ─────────────────────────────────────────────
      - name: Redeploy Tap service
        if: steps.check.outputs.ready == 'true'
        env:
          RESOLVED_TAP_ID: ${{ steps.resolve.outputs.tap_id }}
          RESOLVED_ENV_ID: ${{ steps.resolve.outputs.env_id }}
        run: |
          RESPONSE=$(curl -sf -X POST "$RAILWAY_API" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg serviceId     "$RESOLVED_TAP_ID" \
              --arg environmentId "$RESOLVED_ENV_ID" \
              '{
                query: "mutation($serviceId: String!, $environmentId: String!) { serviceInstanceDeploy(serviceId: $serviceId, environmentId: $environmentId) }",
                variables: { serviceId: $serviceId, environmentId: $environmentId }
              }')")
          echo "✅ Tap redeploy triggered"
          echo "$RESPONSE"

      - name: Redeploy Indexer service
        if: steps.check.outputs.ready == 'true'
        env:
          RESOLVED_INDEXER_ID: ${{ steps.resolve.outputs.indexer_id }}
          RESOLVED_ENV_ID: ${{ steps.resolve.outputs.env_id }}
        run: |
          RESPONSE=$(curl -sf -X POST "$RAILWAY_API" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg serviceId     "$RESOLVED_INDEXER_ID" \
              --arg environmentId "$RESOLVED_ENV_ID" \
              '{
                query: "mutation($serviceId: String!, $environmentId: String!) { serviceInstanceDeploy(serviceId: $serviceId, environmentId: $environmentId) }",
                variables: { serviceId: $serviceId, environmentId: $environmentId }
              }')")
          echo "✅ Indexer redeploy triggered"
          echo "$RESPONSE"

      # ── Summary ───────────────────────────────────────────────────────────
      - name: Deployment Summary
        if: always()
        run: |
          echo "### Railway Deployment" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check.outputs.ready }}" != "true" ]; then
            echo "⚠️ **Skipped:** RAILWAY_TOKEN or RAILWAY_PROJECT_ID not configured" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Env vars synced and deployment triggered — check [Railway Dashboard](https://railway.app) for status." >> $GITHUB_STEP_SUMMARY
          fi
