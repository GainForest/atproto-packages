name: CI - Bumicerts

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/bumicerts/**'
      - '!apps/bumicerts/**/*.md'          # ignore .md changes...
      - 'apps/bumicerts/app/**/*.md'       # ...unless they're inside app/
      - 'apps/bumicerts/public/**/*.md'    # ...or inside public/
      - 'packages/**'
      - 'GENERATED/**'
  pull_request:
    paths:
      - 'apps/bumicerts/**'
      - '!apps/bumicerts/**/*.md'
      - 'apps/bumicerts/app/**/*.md'
      - 'apps/bumicerts/public/**/*.md'
      - 'packages/**'
      - 'GENERATED/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.7"

      - name: Install dependencies
        run: bun install

      - name: Generate types
        run: bun run gen:types

      - name: Build library packages (sequential to respect dependency order)
        run: |
          bun run --filter '@gainforest/internal-utils' build
          bun run --filter '@gainforest/atproto-mutations-core' build
          bun run --filter '@gainforest/atproto-auth-next' build
          bun run --filter '@gainforest/atproto-mutations-next' build
          bun run --filter '@gainforest/leaflet-react' build

      - name: Typecheck bumicerts
        run: bun run typecheck
        working-directory: apps/bumicerts
        env:
          SKIP_ENV_VALIDATION: 1

      - name: Build bumicerts
        run: |
          mkdir -p .vercel
          echo '{"projectId":"${{ secrets.VERCEL_PROJECT_ID }}","orgId":"${{ secrets.VERCEL_ORG_ID }}"}' > .vercel/project.json
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bunx vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
            bunx vercel build --token=${{ secrets.VERCEL_TOKEN }}
          else
            bunx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
            bunx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          fi

      - name: Deploy to Vercel (production)
        if: github.event_name != 'pull_request'
        run: bunx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (preview)
        if: github.event_name == 'pull_request'
        run: bunx vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
